services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---- Optional: local PostgreSQL instead of SQLite ----
  # Uncomment to run the API against Postgres locally. Then in the `app` service set
  #   DATABASE_URL: postgresql://oms_user:oms_pass@postgres:5432/order_management
  # and either set APP_ENV=production (so start.sh runs `alembic upgrade head`) or run
  # the migration by hand. The `volumes:` block at the bottom must also be uncommented.
  # postgres:
  #   image: postgres:16-alpine
  #   environment:
  #     POSTGRES_USER: oms_user
  #     POSTGRES_PASSWORD: oms_pass
  #     POSTGRES_DB: order_management
  #   ports:
  #     - "5432:5432"
  #   volumes:
  #     - postgres_data:/var/lib/postgresql/data

  app:
    build: .
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      # Compose `environment:` overrides `env_file:` — inside Docker the broker is the redis
      # service (Docker DNS "redis"), not localhost.
      REDIS_URL: redis://redis:6379/0
      DATABASE_URL: sqlite:///./order_management.db
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3

  celery-worker:
    build: .
    command: celery -A app.workers.celery_app worker --loglevel=info --concurrency=2
    env_file: .env
    environment:
      REDIS_URL: redis://redis:6379/0
      DATABASE_URL: sqlite:///./order_management.db
    depends_on:
      redis:
        condition: service_healthy

  flower:
    build: .
    command: celery -A app.workers.celery_app flower --port=5555
    ports:
      - "5555:5555"
    env_file: .env
    environment:
      REDIS_URL: redis://redis:6379/0
    depends_on:
      - redis
      - celery-worker

# Uncomment together with the `postgres` service above to persist its data:
# volumes:
#   postgres_data:
