name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install ruff==0.4.4
      - run: ruff check app/

  test:
    name: Test
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run tests
        env:
          DATABASE_URL: sqlite:///./test.db
          JWT_SECRET_KEY: test-secret-key-ci
          JWT_ALGORITHM: HS256
          JWT_EXPIRY_MINUTES: 60
          APP_ENV: test
          API_VERSION: v1
          REDIS_URL: redis://localhost:6379/0
        run: pytest --cov=app --cov-report=term-missing -v
      - name: Check coverage threshold
        env:
          DATABASE_URL: sqlite:///./test.db
          JWT_SECRET_KEY: test-secret-key-ci
          REDIS_URL: redis://localhost:6379/0
        run: pytest --cov=app --cov-fail-under=60

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [test]
    steps:
      - uses: actions/checkout@v4
      - name: Build image
        run: docker build -t order-management:test .
      - name: Test health endpoint
        run: |
          docker run -d \
            --name test-app \
            -p 8000:8000 \
            -e DATABASE_URL=sqlite:///./order_management.db \
            -e JWT_SECRET_KEY=test-secret \
            -e REDIS_URL=redis://localhost:6379/0 \
            order-management:test
          sleep 8
          curl --fail http://localhost:8000/health || exit 1
          docker stop test-app

  deploy:
    name: Deploy to Render
    runs-on: ubuntu-latest
    needs: [lint, test, docker]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Deploy API
        run: |
          curl -X POST \
            "https://api.render.com/v1/services/${{ secrets.RENDER_SERVICE_ID }}/deploys" \
            -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d '{"clearCache": false}'
      # Celery worker not deployed on Render (requires paid plan)
      # Worker runs locally via: docker compose up
      - name: Deployment complete
        run: echo "API deployed to https://order-management-api-v6p6.onrender.com"